<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поисковик ответов по билетам на казахский язык.Для любимого Ансарчика</title>
    <style>
        :root {
            --bg: #f6f7fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #d9dee8;
            --blue: #2563eb;
            --green-bg: #ecfdf5;
            --green: #047857;
            --shadow: 0 8px 22px rgba(31, 41, 55, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .wrap {
            width: min(960px, calc(100% - 28px));
            margin: 28px auto;
        }
        h1 {
            margin: 0 0 8px;
            text-align: center;
            font-size: 30px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: var(--muted);
            margin-bottom: 22px;
        }
        .tabs {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab {
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            border-radius: 8px;
            padding: 10px 14px;
            cursor: pointer;
            font-size: 15px;
        }
        .tab:hover { border-color: var(--blue); color: var(--blue); }
        .tab.active {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }
        .search {
            width: 100%;
            border: 1px solid var(--border);
            background: var(--panel);
            border-radius: 8px;
            padding: 14px 16px;
            font-size: 17px;
            outline: none;
            box-shadow: var(--shadow);
        }
        .search:focus { border-color: var(--blue); }
        .counter {
            margin: 14px 2px;
            color: var(--muted);
            font-size: 14px;
        }
        .results { display: grid; gap: 12px; }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(31, 41, 55, 0.04);
        }
        .badge {
            display: inline-block;
            margin-bottom: 8px;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: 700;
        }
        .kazakh { background: #e0f2fe; color: #0369a1; }
        .question {
            font-size: 16px;
            line-height: 1.45;
            font-weight: 650;
            margin-bottom: 10px;
            white-space: pre-line;
        }
        .answer {
            color: var(--green);
            background: var(--green-bg);
            border-left: 4px solid #10b981;
            border-radius: 0 7px 7px 0;
            padding: 9px 12px;
            line-height: 1.45;
            white-space: pre-line;
        }
        .empty {
            text-align: center;
            color: var(--muted);
            padding: 30px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <main class="wrap">
        <h1>Поисковик ответов</h1>
        <div class="subtitle" id="total-counter">Всего вопросов: 31</div>

        <div class="tabs" id="tabs">
            <button class="tab active" data-subject="kazakh">Қазақ тілі (31 Билет)</button>
        </div>

        <div id="kazakh-keyboard" style="display: flex; gap: 6px; margin: 8px 2px; flex-wrap: wrap;">
            <button type="button" class="tab" style="padding: 6px 12px; font-size: 14px;" onclick="insertSymbol('Ә')">Ә</button>
            <button type="button" class="tab" style="padding: 6px 12px; font-size: 14px;" onclick="insertSymbol('І')">І</button>
            <button type="button" class="tab" style="padding: 6px 12px; font-size: 14px;" onclick="insertSymbol('Ң')">Ң</button> 
            <button type="button" class="tab" style="padding: 6px 12px; font-size: 14px;" onclick="insertSymbol('Ғ')">Ғ</button>
            <button type="button" class="tab" style="padding: 6px 12px; font-size: 14px;" onclick="insertSymbol('Ү')">Ү</button>
            <button type="button" class="tab" style="padding: 6px 12px; font-size: 14px;" onclick="insertSymbol('Ұ')">Ұ</button>
            <button type="button" class="tab" style="padding: 6px 12px; font-size: 14px;" onclick="insertSymbol('Қ')">Қ</button>
            <button type="button" class="tab" style="padding: 6px 12px; font-size: 14px;" onclick="insertSymbol('Ө')">Ө</button>
            
        </div>

        <input class="search" id="search" type="text" placeholder="Билет нөмірін немесе кілт сөзді енгізіңіз (мысалы: Билет №3)...">
        <div class="counter" id="counter"></div>
        <section class="results" id="results"></section>
    </main>

    <script>
        const quizDatabase = [
            {
                "subject": "kazakh",
                "question": "Билет 1",
                "correct": "№1 Мәтін:\nҚазақ тілі — Қазақстан Республикасының мемлекеттік тілі. Ол түркі тілдер тобына жатады және қазақ халқының ана тілі болып табылады. Қазақ тілі мемлекеттік мекемелерде, білім берегу саласында және қоғамдық өмірде кеңінен қолданылады. Бұл тіл қазақ халқының мәдениеті мен дәстүрін сақтауда маңызды рөл атқарады. Сондықтан Қазақстанда қазақ тілін дамытуға ерекше көңіл бөлінеді.\n\n№2 Сұрақтар мен Жауаптар:\n• Қазақстан Республикасының мемлекеттік тілі қай тіл? -> Қазақ тілі.\n• Мемлекеттік тіл елдің қандай аумағында қолданылуы тиіс? -> Бүкіл аумағында.\n• Мәтінге сүйене отырып, мемлекеттік тіл қолданылатын негізгі ресми салаларды атаңыз. -> Мемлекеттік мекемелерде, білім беру саласында және қоғамдық өмірде.\n• Қазақстан Республикасының әрбір азаматы үшін не міндетті парыз болып табылады? -> Мемлекеттік тілді меңгеру.\n• Мәтіндегі ақпаратқа сүйенсек, іс қағаздарын жүргізу қай тілде іске асырылуы керек? -> Мемлекеттік (қазақ) тілде.\n\n№3 Сөздік:\n• Бап – Статья\n• Міндетті парыз – Обязательный долг\n• Меңгеру – Овладение / Освоение\n• Үкімет – Правительство\n• Бүкіл аумағында – На всей территории\n• Қоғамдық қатынастардың барлық саласында – Во всех сферах общественных отношений\n• Мемлекеттік басқару – Государственное управление\n• Заң шығару – Законодательство\n• Сот ісін жүргізу – Судопроизводство\n• Іс қағаздарын жүргізу – Делопроизводство"
            },
            {
                "subject": "kazakh",
                "question": "Билет 2",
                "correct": "№1 Мәтін:\nБүгінде отандық өнімдерге, әсіресе экологиялық таза азық-түлікке сұраныс артып келеді. Елімізде ауыл шаруашылығын дамыту және экспорт көлемін ұлғайту жоспарлануда. Шығыс Қазақстан омарташылары экологиялық таза бал өндіруде үлкен жетістікке жеткен. Олар тұтынушылар сұранысына сай күніне 2 тонна бал жөнелтеді. Болашақта бұл балды Қытай нарығына шығару көзделіп отыр. Қазақстандық ет пен ет өнімдері шетелде жоғары сұранысқа ие. Мал және құс еті Тәжікстан, Қытай, Өзбекстан, Біріккен Араб Әмірліктері мен Иранға экспортталады. Сондай-ақ қымыз өндірушілері халықаралық деңгейде танылып, бие сүтінің құрғақ түріне сұраныс күннен күнге артып келеді.\n\n№2 Сұрақтарға жауаптар:\n• Қазіргі таңда қандай отандық тауарларға сұраныс артып келеді? -> Экологиялық таза азық-түлікке, балға, ет өнімдеріне және құрғақ бие сүтіне.\n• Неліктен еліміздің ауыл шаруашылығын дамыту жоспарланып отыр? -> Экспорт көлемін ұлғайту және отандық өнімге сұранысты қанағаттандыру үшін.\n• Шығысқазақстандық омарташылар қандай жетістікке жетті? -> Экологиялық таза бал өндіруде үлкен жетістікке жетіп, күніне 2 тонна бал жөнелтеді.\n• Олар күніне тұтынушыларға қанша тонна бал жөнелтеді? -> Күніне 2 тонна бал.\n• Қазақстандық балды қай елдин нарығына шығару жоспарланып отыр? -> Қытай нарығына.\n• Қазақстандық ет пен ет өнімдері неге шетелде сұранысқа ие? -> Себебі олар экологиялық таза және сапалы.\n• Қазақстанның еті қандай елдерге экспортталады? -> Тәжікстан, Қытай, Өзбекстан, БӘӘ және Иранға.\n• Қазақстандық қымыз өндірушілері немен танылды? -> Халықаралық деңгейде танылып, құрғақ бие сүтін шығарумен.\n• Бие сүтінің қандай түріне сұраныс артып келеді? -> Құрғақ түріне.\n\n№3 Сөз тіркестері:\n• отандық өнім — отечественная продукция -> отандық өнім өндіру\n• өндіріс — производство -> өндірісті дамыту\n• экологиялық таза тағам — экологически чистый продукт питания -> экологиялық таза тағам өндіру\n• сұраныс — спрос -> сұраныстың артуы\n• өнім шығару — выпуск продукции -> жаңа өнім шығару\n• тауар — товар -> тауар экспорттау\n• тұтынушы — потребитель -> тұтынушыға жеткізу\n• омарташы — пчеловод -> тәжірибелі омарташы\n• өркендету — развивать -> ауыл шаруашылығын өркендету"
            },
            {
                "subject": "kazakh",
                "question": "Билет 3",
                "correct": "№1 Мәтін:\nМен қазақ тілін әртүрлі себептермен үйреніп жүрмін. Ең алдымен, өзім үшін және білімді болу үшін мемлекеттік тілді жақсы меңгергім еді. Сонымен қатар оқуым үшін қазақ тілі сабағына дайындалып, мәтінді қазақша оқу, сөйлем құрау және мәтіннің мазмұнын айту дағдыларын дамытып жүрмін. Қызметім үшін де қазақ тілі қажет, себебі жауап беру, мәтінді қазақ тіліне аудару және ауызша сөйлеу маңызды. Қазақ тілінде сөйлеу үшін әңгімелеу, өлең жаттау және қазақша сөйлеу машығын жетілдіріп келемін. Сондай-ақ фильмдерді, әндерді түсіну үшін және ауылдарға саяхат жасау үшін де бұл тілді үйрену өте пайдалы. Қазақ тілін зерттеу мен оны терең меңгеру мен үшін маңызды мақсат болып табылады.\n\n№2 Мақал-мәтелдерді аяқтау (Сәйкестендіру):\n• Тіл қаруы - сөз, қаруы - ой.\n• Тіліңмен жүгірме, біліміңмен жүгір.\n• Сөз сөзден туады, сөйлемесе неден туады?\n• Ана тілі ой өсіреді, ана сүті бой өсіреді.\n• Көп сөз – күміс, аз сөз – алтын.\n• Бал тамған тілден у да тамады.\n• Тіл қылыштан өткір.\n• Өнер алды - қызыл тіл.\n• Тіл тиексіз, ой түпсіз.\n\n№3 Сөйлемдерді аудару:\n1. В мире насчитывается около 6000 языков, но у каждого народа есть свой родной язык, родной язык — это язык твоего отца и матери. -> Әлемде 6000-ға жуық тіл бар, бірақ әр халықтың өз ана тілі бар, ана тілі — бұл сенің әкең мен анаңның тілі.\n2. Родной язык русского народа — русский язык, китайского народа — китайский язык, немецкого народа — немецкий язык, казахского народа — казахский язык. -> Орыс халқының ана тілі — орыс тілі, қытай халқының — қытай тілі, неміс халқының — неміс тілі, қазақ халқының — қазақ тілі.\n3. Казахский язык — богатый язык. -> Қазақ тілі — бай тіл.\n4. Это язык, который был учителем казахского народа, когда у него не было письменности, книг и школ. -> Бұл қазақ халқының жазуы, кітаптары мен мектептері болмаған кезде оның мұғалімі болған тіл.\n5. На родном языке казахский народ создал известные во всём мире эпосы о богатырях, такие как «Алпамыс», «Кобыланды», «Ер Таргын», а также любовные поэмы «Кыз Жибек» и «Козы Корпеш – Баян сулу». -> Қазақ халқы өз ана тілінде әлемге танымал «Алпамыс», «Қобыланды», «Ер Тарғын» сияқты батырлар жырын, сондай-ақ «Қыз Жібек» пен «Қозы Көрпеш – Баян сұлу» махаббат дастандарын дүниеге әкелді."
            },
            {
                "subject": "kazakh",
                "question": "Билет 4",
                "correct": "№1 Сөздік аудармасы:\n• Шойынжол — железная дорога\n• Отарба — поезд\n• Қара бұқа — чёрный бык\n• Тұяғы таю — поскользнуться (соскользнуло копыто)\n• Жол жайы — дорожная обстановка (состояние дороги)\n\n№2 Б. Қыдырбекұлы туралы мәлімет және Ой толғау:\n1. Балғабек Қыдырбекұлы сатира және юмор жанрында жазып, қоғам өмірі мен өндіріс мәселелерін бейнелеген.\n2. Оның алғашқы фельетондар жинағы «Күлкі және шындық» деп аталады.\n3. Өндіріс тақырыбындағы әйгілі шығармасы — «Теміржолшы».\n4. Ол ірі тұлғалар мен еңбек адамдарының бейнесін шебер сомдаған шығармалар жазған.\n5. Б. Қыдырбекұлы ірі тұлғалар мен еңбек адамдарының образдарын айқын көрсетті.\n• Менің ойым: Оның шығармалары шынайы өмірді көрсетіп, қоғам туралы терең ойлануға мәжбүр етеді.\n\n№3 Түсіндірме сөздік:\n• жинақ — сборник, бірнеше шығарманың бір кітапқа топтастырылуы\n• сықақ — сатира, кемшілікті күлкі арқылы әшкерелеу\n• танымал — известный, көпшілікке белгілі адам немесе нәрсе\n• шеберлік — мастерство, белгілі бір істі жақсы, жоғары деңгейде орындау қабілеті\n• әңгіме — рассказ, шағын көркем шығарма\n• теміржол құрылысы — строительство железной дороги, темір жолды салу процесі"
            },
            {
                "subject": "kazakh",
                "question": "Билет 5",
                "correct": "№1 Мәтін құрау:\nҚарағанды қаласы — Қазақстанның орталығындағы ірі өнеркәсіп және мәдени орталық, ол Қарағанды облысының әкімшілік орталығы болып саналады. Қала көмір өндірісімен танымал болғандықтан «кеншілер қаласы» деп аталады. Мұнда металлургия, машина жасау және басқа да өнеркәсіп салалары дамыған. Қалада жоғары оқу орындары, театрлар, музейлер және спорт нысандары бар. Қарағанды — заманауи инфрақұрылымы бар мәдени дамыған қала. Оның тарихы мен еңбек дәстүрі қаланың дамуына үлкен әсер еткен. Бүгінде ол Қазақстандағы маңызды экономикалық және мәдени орталықтардың бірі болып табылады.\n\n№2 Сұрақтар мен тезистер:\n1. Орталық Қазақстанға Қарағанды, Ақмола, Павлодар және Ұлытау облыстары жатады.\n2. Орталық Қазақстандағы ірі қалалар — Қарағанды, Теміртау, Жезқазған, Балқаш.\n3. Орталық Қазақстанда көмір шахталары, металлургия, мыс қорыту және машина жасау кәсіпорындары бар.\n4. Орталық Қазақстан әлемге көмір, мыс және металлургия өнеркәсібімен танымал.\n\n№3 Көп нүктенің орнына тиісті сөздер:\n1. қолайлы\n2. орналасқан\n3. орындары\n4. өндіріп\n5. табылады"

        const subjectLabels = {
            kazakh: { name: "Қазақ тілі", className: "kazakh" }
        };

        const search = document.getElementById("search");
        const results = document.getElementById("results");
        const counter = document.getElementById("counter");

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                "\"": "&quot;",
                "'": "&#039;"
            }[char]));
        }

        function render() {
            const rawTerm = search.value.trim();
            const term = rawTerm.toLowerCase();

            const filtered = quizDatabase.filter(item => {
                const plainText = `${item.question} ${item.correct}`.toLowerCase();
                return !term || plainText.includes(term);
            });

            counter.textContent = `Табылды: ${filtered.length}`;
            if (!filtered.length) {
                results.innerHTML = '<div class="empty">Ештеңе табылмады</div>';
                return;
            }

            results.innerHTML = filtered.map(item => {
                const subject = subjectLabels[item.subject] || { name: item.subject, className: "" };
                return `
                    <article class="card">
                        <span class="badge ${subject.className}">${subject.name}</span>
                        <div class="question">${escapeHtml(item.question)}</div>
                        <div class="answer"><strong>Мазмұны мен жауаптары:</strong><br>${escapeHtml(item.correct)}</div>
                    </article>
                `;
            }).join("");
        }

        search.addEventListener("input", render);
        render();

        window.insertSymbol = function(symbol) {
            const searchInput = document.getElementById("search");
            
            const start = searchInput.selectionStart;
            const end = searchInput.selectionEnd;
            const text = searchInput.value;
            
            searchInput.value = text.substring(0, start) + symbol + text.substring(end);
            
            searchInput.focus();
            searchInput.selectionStart = searchInput.selectionEnd = start + symbol.length;
            
            render();
        };
    </script>
